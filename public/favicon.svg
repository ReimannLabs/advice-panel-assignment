  <text x="32" y="44" font-family="'Merriweather', 'Georgia', serif" font-weight="900" font-size="44" fill="#111111" text-anchor="middle">D</text>
  <!-- Optional subtle lines -->
  <line x1="16" y1="52" x2="48" y2="52" stroke="#111111" stroke-width="2"/>
